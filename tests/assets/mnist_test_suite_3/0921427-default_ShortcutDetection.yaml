model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.01
    max_epochs: 5
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  indices:
    split_filename: mnist_train_unit_shortcut_split.yaml
    split_name: train
    val: 0.1
    test: 0.1
    seed: 42
  transforms: none
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_train_unit_shortcut.yaml
      p: 1.0
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: none
  indices: all
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_test_unit_shortcut.yaml
      p: 0.3
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: 0921427-default_ShortcutDetection
bench: ShortcutDetection
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
metadata_str: quanda-bench-test/0921427-default_ShortcutDetection_metadata
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
cfg_output_dir: tests/assets/mnist_test_suite_3
cfg_file_name: 0921427-default_ShortcutDetection.yaml
