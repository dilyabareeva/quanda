model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.001
    max_epochs: 5
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  transforms: mnist_transforms
  indices: all
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: ${log_dir}/wandb/
  project: quanda-bench
id: 7ed30b3-default_MixedDatasets
meta_id: 7ed30b3_metadata
bench: MixedDatasets
adversarial_label: 0
bench_save_dir: tests/assets/mnist_test_suite_2
repo_id: "quanda-bench-test"
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
adv_dataset:
  single_class_dataset: true
  label: 0
  transforms: "adversarial_transforms"
  split_filename: "fashion_mnist_split.yaml"
  dataset_str: "quanda-bench-test/fashion_mnist_unit"
  save_dir: "fashion_mnist_unit"
cfg_file_name: 7ed30b3-default_MixedDatasets.yaml
cfg_output_dir: tests/assets/mnist_test_suite_2
ckpts:
- 7ed30b3-default_MixedDatasets