model:
  ckpt_postfix: base
  module:
    name: MnistTorch
    args:
      num_outputs: 10
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  transforms: mnist_transforms
  indices: all
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
trainer:
  optimizer: adam
  optimizer_kwargs:
    weight_decay: 0.0
  criterion: cross_entropy
  criterion_kwargs: {}
  scheduler: constant
  scheduler_kwargs:
    last_epoch: -1
  lr: 0.001
  max_epochs: 5
  seed: 42
id: 99e01f1-default
bench: ClassDetection
adversarial_label: 0
metadata_dir: tests/assets/mnist_test_suite_2/metadata
ckpt_dir: tests/assets/mnist_test_suite_2/ckpt
dataset_dir: tests/assets/mnist_test_suite_2/fashion_mnist_examples
cache_dir: ./tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
seed: 42
cfg_file_name: 99e01f1-default_ClassDetection.yaml
cfg_output_dir: tests/assets/mnist_test_suite_2
