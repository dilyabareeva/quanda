model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.01
    max_epochs: 5
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  transforms: mnist_transforms
  indices: all
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: c2838d7-default_LDS
bench: LDS
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
subset_ckpts:
- c2838d7-default_LDS_lds_subset_0
- c2838d7-default_LDS_lds_subset_1
- c2838d7-default_LDS_lds_subset_2
- c2838d7-default_LDS_lds_subset_3
- c2838d7-default_LDS_lds_subset_4
ckpts:
- c2838d7-default_LDS
cfg_output_dir: tests/assets/mnist_test_suite_2
cfg_file_name: c2838d7-default_LDS.yaml
