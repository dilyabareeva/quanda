model:
  ckpt_postfix: subclass
  module:
    name: MnistTorch
    args:
      num_outputs: 2
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  transforms: mnist_transforms
  indices: all
  wrapper:
    type: LabelGroupingDataset
    metadata:
      metadata_filename: mnist_train_unit_subclass.yaml
      p: 1.0
      n_groups: 2
      class_to_group: random
      seed: 42
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
  wrapper:
    type: LabelGroupingDataset
    metadata:
      metadata_filename: mnist_test_unit_subclass.yaml
      p: 1.0
      n_groups: 2
      class_to_group: random
      seed: 42
trainer:
  optimizer: adam
  optimizer_kwargs:
    weight_decay: 0.0
  criterion: cross_entropy
  criterion_kwargs: {}
  scheduler: constant
  scheduler_kwargs:
    last_epoch: -1
  lr: 0.001
  max_epochs: 5
  seed: 42
  logger: tensorboard
  logger_kwargs:
    save_dir: logs
id: 99e01f1-default
bench: SubclassDetection
adversarial_label: 0
metadata_dir: tests/assets/mnist_test_suite_2/metadata
ckpt_dir: tests/assets/mnist_test_suite_2/ckpt
dataset_dir: tests/assets/mnist_test_suite_2/fashion_mnist_examples
cache_dir: ./tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
seed: 42
cfg_file_name: 99e01f1-default_SubclassDetection.yaml
cfg_output_dir: tests/assets/mnist_test_suite_2
