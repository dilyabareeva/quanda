model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: sgd
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.02
    max_epochs: 15
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  indices:
    split_filename: mnist_train_unit_mislabeling_split.yaml
    split_name: train
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
  transforms: mnist_transforms
  wrapper:
    type: LabelFlippingDataset
    metadata:
      metadata_filename: mnist_train_unit_mislabeling.yaml
      p: 0.1
      seed: 43
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
val_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  indices:
    split_filename: mnist_train_unit_mislabeling_split.yaml
    split_name: val
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
  transforms: mnist_transforms
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: 20fba38-default_MislabelingDetection
bench: MislabelingDetection
adversarial_label: 0
bench_save_dir: tests/assets/mnist_local_bench
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: auto
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpts:
- quanda-bench-test/20fba38-default_MislabelingDetection
cfg_output_dir: tests/assets/mnist_local_bench
cfg_file_name: 20fba38-default_MislabelingDetection.yaml
