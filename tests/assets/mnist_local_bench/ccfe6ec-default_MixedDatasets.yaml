model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.01
    max_epochs: 10
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  transforms: mnist_transforms
  indices: all
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: mnist_transforms
  indices: all
  filter_indices:
    split_filename: mnist_eval_mixed_main_split.yaml
    split_name: default
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: ccfe6ec-default_MixedDatasets
bench: MixedDatasets
adversarial_label: 0
bench_save_dir: tests/assets/mnist_local_bench
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: auto
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpts:
- ccfe6ec-default_MixedDatasets
adv_dataset:
  single_class_dataset: true
  label: 0
  transforms: adversarial_transforms
  dataset_str: quanda-bench-test/fashion_mnist_unit
  indices:
    split_filename: fashion_mnist_split.yaml
    split_ratios:
      train: 0.34
      val: 0.33
      test: 0.33
    seed: 42
cfg_output_dir: tests/assets/mnist_local_bench
cfg_file_name: ccfe6ec-default_MixedDatasets.yaml
