model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.01
    max_epochs: 5
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train[:1%]
  indices:
    split_filename: mnist_train_unit_shortcut_split.yaml
    split_name: train
    split_ratios:
      train: 0.6
      val: 0.2
      test: 0.2
    seed: 42
  transforms: none
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_train_unit_shortcut.yaml
      p: 0.3
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test[:1%]
  transforms: none
  indices: all
  filter_indices:
    split_filename: mnist_eval_shortcut_split.yaml
    split_name: default
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_eval_unit_shortcut.yaml
      p: 1.0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: fd1961d-default_ShortcutDetection
bench: ShortcutDetection
filter_by_class: true
filter_by_prediction: true
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpts:
- fd1961d-default_ShortcutDetection
cfg_output_dir: tests/assets/unit_bench_cfgs
cfg_file_name: fd1961d-default_ShortcutDetection.yaml
