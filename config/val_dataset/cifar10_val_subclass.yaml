dataset_str: uoft-cs/cifar10
dataset_split: train
transforms: "cifar10_transforms"
indices:
  split_filename: "cifar10_train_subclass_split.yaml"
  split_name: val
  split_ratios:
    train: 0.8
    val: 0.2
    test: 0.
  seed: 42
wrapper:
  type: "LabelGroupingDataset"
  metadata:
      metadata_filename: "cifar10_val_subclass.yaml"
      p: 1.0
      n_groups: 2
      class_to_group: "random"
      seed: 42
