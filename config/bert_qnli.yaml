defaults:
  - model: bert_base_cased
  - train_dataset: qnli_train
  - eval_dataset: qnli_test
  - val_dataset: qnli_val
  - model/trainer: bert_qnli
  - logger: wandb
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: grid
  - _self_

hydra:
  sweep:
    dir: "${log_dir}/${id}"
    subdir: hydra_logs

  sweeper:
    direction:
      - maximize
    study_name: "${cfg_file_name}"
    storage: null
    n_trials: 20
    n_jobs: 1
    params:
      model.trainer.lr: choice(1.0e-3, 5.0e-4, 1.0e-4)
      model.trainer.max_epochs: choice(10, 20)

id: "default"
bench: LDS
bench_save_dir: "bench_out"
log_dir: hydra_logs
repo_id: "quanda-bench-test"
cache_dir: "tmp"
top_k: 5
model_id: "0"
correlation_fn: "kendall"
offline: true
seed: 42
device: "auto"
use_predictions: true

m: 4
alpha: 0.5

subset_ids: lds_subsets.yaml

ckpts:
  - "${id}"
