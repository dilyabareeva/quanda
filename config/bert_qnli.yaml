defaults:
  - model: bert_base_cased
  - train_dataset: qnli_train
  - eval_dataset: qnli_test
  - val_dataset: qnli_val
  - model/trainer: bert_qnli
  - logger: wandb
  - override hydra/launcher: joblib
  - _self_

hydra:
  sweep:
    dir: "${log_dir}/${id}"
    subdir: hydra_logs

  launcher:
    n_jobs: 3

id: "bert_qnli"
bench: LDS
bench_save_dir: "bench_out"
log_dir: hydra_logs
repo_id: "quanda-bench-test"
cache_dir: "tmp"
top_k: 5
model_id: "0"
correlation_fn: "kendall"
offline: true
seed: 42
device: "auto"
use_predictions: true
batch_size: 64

m: 100
alpha: 0.5

subset_ids: lds_subsets.yaml

ckpt: "${repo_id}/${id}"
num_checkpoints: 5
meta_id: "${repo_id}/${id}_metadata"

splits:
  qnli_train_50k:
    filename: qnli_train_50k_split.yaml
    ratios: {train: 0.47736, val: 0.1, test: 0.0}
    seed: 42
  qnli_train_mislabeling_50k:
    filename: qnli_train_mislabeling_50k_split.yaml
    ratios: {train: 0.47736, val: 0.1, test: 0.0}
    seed: 42
