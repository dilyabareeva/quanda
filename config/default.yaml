defaults:
  - model: mnist_lenet_base
  - train_dataset: mnist_train_unit
  - eval_dataset: mnist_test_unit
  - val_dataset: null
  - model/trainer: default
  - logger: wandb
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe
  - _self_

hydra:
  sweep:
    dir: "${log_dir}/${id}"
    subdir: hydra_logs

  sweeper:
    sampler:
      seed: 123
    direction:
      - maximize
    study_name: "${cfg_file_name}"
    storage: null
    n_trials: 2
    n_jobs: 1
    params:
      model.trainer.lr: choice(0.02, 0.01, 0.001)


id: "default"
bench: ClassDetection
adversarial_label: 0
bench_save_dir: "bench_out"
log_dir: hydra_logs
repo_id: "quanda-bench-test"
cache_dir: "tmp"
top_k: 5
model_id: "0"
correlation_fn: "kendall"
offline: true
seed: 42

m: 4
alpha: 0.5

subset_ids: lds_subsets.yaml

ckpts:
  - "${id}"