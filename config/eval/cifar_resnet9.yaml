defaults:
  - explainer: similarity
  - override hydra/launcher: joblib
  - override hydra/sweeper: basic
  - _self_

hydra:
  sweep:
    dir: "${results_dir}/${bench}__${explainer.name}"
    subdir: ${hydra.job.num}
  launcher:
    n_jobs: 1

bench: cifar_class_detection
cache_dir: /data/cluster/users/bareeva/quanda_output/cifar_eval
results_dir: /data/cluster/users/bareeva/quanda_output/cifar_eval_results
device: cuda:0
batch_size: 32

bench_eval:
  cifar_class_detection: {max_eval_n: 1000, eval_seed: 42}
  cifar_subclass_detection: {max_eval_n: 1000, eval_seed: 42}
  cifar_mislabeling_detection: {max_eval_n: null, eval_seed: 42}
  cifar_shortcut_detection: {max_eval_n: 1000, eval_seed: 42}
  cifar_mixed_datasets: {max_eval_n: 1000, eval_seed: 42}
  cifar_linear_datamodeling: {max_eval_n: 1000, eval_seed: 42}
  cifar_top_k_cardinality: {max_eval_n: 1000, eval_seed: 42}
  cifar_model_randomization: {max_eval_n: 1000, eval_seed: 42}

final_fc_layer: model.9
