dataset_str: ylecun/mnist
dataset_split: train
indices:
  split_filename: "mnist_train_unit_subclass_split.yaml"
  split_name: train
  split_ratios:
    train: 0.6
    val: 0.2
    test: 0.2
  seed: 42
transforms: "mnist_transforms"
wrapper:
  type: "LabelGroupingDataset"
  metadata:
      metadata_filename: "mnist_train_unit_subclass.yaml"
      p: 1.0
      n_groups: 2
      class_to_group: "random"
      seed: 42
