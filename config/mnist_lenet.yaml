defaults:
  - model: mnist_lenet_base
  - train_dataset: mnist_train_unit
  - eval_dataset: mnist_test_unit
  - val_dataset: mnist_val
  - model/trainer: default
  - logger: wandb
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: grid
  - override hydra/launcher: joblib
  - _self_

hydra:
  sweep:
    dir: "${log_dir}/${id}"
    subdir: hydra_logs

  launcher:
    n_jobs: 16

  sweeper:
    direction:
      - maximize
    study_name: "${cfg_file_name}"
    storage: null
    n_trials: 20
    n_jobs: 16
    params:
      model.trainer.lr: choice(0.01, 0.001)

id: "default"
bench: ClassDetection
adversarial_label: 0
bench_save_dir: "bench_out"
log_dir: hydra_logs
repo_id: "quanda-bench-test"
cache_dir: "tmp"
top_k: 5
model_id: "0"
correlation_fn: "kendall"
offline: true
seed: 42
device: "cuda:1"
batch_size: 64

m: 100
alpha: 0.5

subset_ids: lds_subsets.yaml

ckpt: "${repo_id}/${id}"
num_checkpoints: 5
meta_id: "${repo_id}/${id}_metadata"

splits:
  mnist_train:
    filename: mnist_train_split.yaml
    ratios: {train: 0.8, val: 0.2, test: 0.0}
    seed: 42
  mnist_train_subclass:
    filename: mnist_train_subclass_split.yaml
    ratios: {train: 0.8, val: 0.2, test: 0.0}
    seed: 42
  mnist_train_shortcut:
    filename: mnist_train_shortcut_split.yaml
    ratios: {train: 0.8, val: 0.2, test: 0.0}
    seed: 42
  mnist_train_mislabeling:
    filename: mnist_train_mislabeling_split.yaml
    ratios: {train: 0.8, val: 0.2, test: 0.0}
    seed: 42
  fashion_mnist:
    filename: fashion_mnist_split.yaml
    ratios: {train: 0.16, val: 0.02, test: 0.02}
    seed: 42
  fashion_mnist_unit:
    filename: fashion_mnist_unit_split.yaml
    ratios: {train: 0.6, val: 0.2, test: 0.2}
    seed: 42
