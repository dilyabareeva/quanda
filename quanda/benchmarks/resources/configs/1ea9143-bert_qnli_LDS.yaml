model:
  pretrained_model_name: google-bert/bert-base-cased
  module:
    name: BertClassifier
    args:
      num_labels: 2
  trainer:
    optimizer: adamw
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: linear
    scheduler_kwargs:
      start_factor: 1.0
      end_factor: 0.1
    lr: 2.0e-05
    max_epochs: 20
    seed: 42
    num_workers: 8
    gradient_clip_val: 1.0
train_dataset:
  dataset_str: SetFit/qnli
  dataset_split: train
  transforms: null
  tokenizer:
    name: google-bert/bert-base-cased
    text_fields:
    - text1
    - text2
    max_length: 128
    label_field: label
  split_ref: qnli_train_50k
  split_name: train
eval_dataset:
  dataset_str: SetFit/qnli
  dataset_split: validation
  transforms: null
  tokenizer:
    name: google-bert/bert-base-cased
    text_fields:
    - text1
    - text2
    max_length: 128
    label_field: label
val_dataset:
  dataset_str: SetFit/qnli
  dataset_split: train
  transforms: null
  tokenizer:
    name: google-bert/bert-base-cased
    text_fields:
    - text1
    - text2
    max_length: 128
    label_field: label
  split_ref: qnli_train_50k
  split_name: val
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: 1ea9143-bert_qnli_LDS
explanations_group: bert_qnli_base
bench: LDS
bench_save_dir: /data/cluster/users/bareeva/quanda_output/train2
log_dir: hydra_logs
