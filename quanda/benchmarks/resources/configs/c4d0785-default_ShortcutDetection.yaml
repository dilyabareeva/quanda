model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.001
    max_epochs: 5
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  indices:
    split_filename: mnist_train_unit_shortcut_split.yaml
    split_name: train
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
  transforms: none
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_train_unit_shortcut.yaml
      p: 0.5
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test
  transforms: none
  indices: all
  filter_indices:
    split_filename: mnist_eval_shortcut_filter.yaml
    split_name: default
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_eval_unit_shortcut.yaml
      p: 1.0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
val_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: none
  indices:
    split_filename: mnist_train_unit_shortcut_split.yaml
    split_name: val
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_val_shortcut.yaml
      p: 0.3
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: c4d0785-default_ShortcutDetection
bench: ClassDetection
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: auto
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpts:
- c4d0785-default_ShortcutDetection
filter_by_shortcut_pred: true
filter_by_non_shortcut: true
cfg_file_name: c4d0785-default_ShortcutDetection.yaml
cfg_output_dir: quanda/benchmarks/resources/configs
