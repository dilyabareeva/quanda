model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.01
    max_epochs: 50
    seed: 42
    num_workers: 8
    enable_progress_bar: false
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: none
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_train_shortcut_transform_indices.yaml
      p: 0.95
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
  split_ref: mnist_train_shortcut
  split_name: train
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test
  transforms: none
  filter_indices:
    split_filename: mnist_eval_shortcut_filter.yaml
    split_name: default
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_eval_shortcut_split.yaml
      p: 1.0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
val_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: none
  wrapper:
    type: SampleTransformationDataset
    metadata:
      metadata_filename: mnist_val_shortcut.yaml
      p: 0.3
      cls_idx: 0
      seed: 42
    sample_fn: add_white_square_mnist
    dataset_transform: mnist_transforms
  split_ref: mnist_train_shortcut
  split_name: val
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: 124627f-default_ShortcutDetection
bench: ShortcutDetection
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: cuda:1
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpt: quanda-bench-test/124627f-default_ShortcutDetection
num_checkpoints: 5
meta_id: quanda-bench-test/124627f-default_ShortcutDetection_metadata
filter_by_shortcut_pred: true
filter_by_non_shortcut: true
cfg_output_dir: quanda/benchmarks/resources/configs
cfg_file_name: 124627f-default_ShortcutDetection.yaml
splits:
  mnist_train_shortcut:
    filename: mnist_train_shortcut_split.yaml
    ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
batch_size: 64
