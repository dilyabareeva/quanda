model:
  module:
    name: ResNet9
    args:
      num_classes: 10
  trainer:
    optimizer: sgd
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.1
    max_epochs: 96
    seed: 42
    num_workers: 8
    enable_progress_bar: false
train_dataset:
  dataset_str: uoft-cs/cifar10
  dataset_split: train
  transforms: cifar10_transforms
  indices:
    split_filename: cifar10_train_split.yaml
    split_name: train
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
eval_dataset:
  dataset_str: uoft-cs/cifar10
  dataset_split: test
  transforms: cifar10_transforms
  indices: all
  filter_indices:
    split_filename: cifar10_eval_mixed_main_filter.yaml
    split_name: default
val_dataset:
  dataset_str: uoft-cs/cifar10
  dataset_split: train
  transforms: cifar10_transforms
  indices:
    split_filename: cifar10_train_split.yaml
    split_name: val
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: bdb919e-default_MixedDatasets
bench: MixedDatasets
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: cuda:0
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpt: quanda-bench-test/bdb919e-default_MixedDatasets
num_checkpoints: 5
meta_id: quanda-bench-test/bdb919e-default_MixedDatasets_metadata
adv_dataset:
  single_class_dataset: true
  label: 0
  transforms: cifar10_adversarial_transforms
  dataset_str: ufldl-stanford/svhn
  dataset_config: cropped_digits
  indices:
    split_filename: svhn_split.yaml
    split_ratios:
      train: 0.16
      val: 0.02
      test: 0.02
    seed: 42
filter_by_prediction: true
cfg_output_dir: quanda/benchmarks/resources/configs
cfg_file_name: bdb919e-default_MixedDatasets.yaml
