model:
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: sgd
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.1
    max_epochs: 15
    seed: 42
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: mnist_transforms
  indices:
    split_filename: mnist_train_split.yaml
    split_name: train
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test
  transforms: mnist_transforms
  indices: all
val_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: mnist_transforms
  indices:
    split_filename: mnist_train_split.yaml
    split_name: val
    split_ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: ad1b983-default_ClassDetection
bench: ClassDetection
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: auto
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpts:
- quanda-bench-test/ad1b983-default_ClassDetection
cfg_output_dir: quanda/benchmarks/resources/configs
cfg_file_name: ad1b983-default_ClassDetection.yaml
