model:
  pretrained_model_name: null
  module:
    name: MnistTorch
    args:
      num_outputs: 10
  trainer:
    optimizer: adam
    optimizer_kwargs:
      weight_decay: 0.0
    criterion: cross_entropy
    criterion_kwargs: {}
    scheduler: constant
    scheduler_kwargs:
      last_epoch: -1
    lr: 0.001
    max_epochs: 200
    seed: 42
    num_workers: 8
    enable_progress_bar: false
train_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: mnist_transforms
  wrapper:
    type: LabelFlippingDataset
    metadata:
      metadata_filename: mnist_train_mislabeling_transform_indices.yaml
      p: 0.1
      seed: 43
  split_ref: mnist_train_mislabeling
  split_name: train
eval_dataset:
  dataset_str: ylecun/mnist
  dataset_split: test
  transforms: mnist_transforms
val_dataset:
  dataset_str: ylecun/mnist
  dataset_split: train
  transforms: mnist_transforms
  split_ref: mnist_train
  split_name: val
logger:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  save_dir: hydra_logs/wandb/
  project: quanda-bench
id: 124627f-default_MislabelingDetection
bench: MislabelingDetection
adversarial_label: 0
bench_save_dir: bench_out
log_dir: hydra_logs
repo_id: quanda-bench-test
cache_dir: tmp
top_k: 5
model_id: '0'
correlation_fn: kendall
offline: true
seed: 42
device: cuda:1
m: 4
alpha: 0.5
subset_ids: lds_subsets.yaml
ckpt: quanda-bench-test/124627f-default_MislabelingDetection
num_checkpoints: 5
meta_id: quanda-bench-test/124627f-default_MislabelingDetection_metadata
cfg_output_dir: quanda/benchmarks/resources/configs
cfg_file_name: 124627f-default_MislabelingDetection.yaml
splits:
  mnist_train_mislabeling:
    filename: mnist_train_mislabeling_split.yaml
    ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
  mnist_train:
    filename: mnist_train_split.yaml
    ratios:
      train: 0.8
      val: 0.2
      test: 0.0
    seed: 42
batch_size: 64
